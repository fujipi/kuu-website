                    placeholder="例：千葉県○○市○○町1-2-3"
                    value={companyInfo.address}
                    onChange={(e) => setCompanyInfo({ ...companyInfo, address: e.target.value })}
                    className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                  />
                </div>

                <button
                  onClick={() => {
                    setRegistered(true);
                    setPage("templates");
                  }}
                  className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 mt-4 transition"
                >
                  登録してテンプレートを見る
                </button>
              </div>
            </div>
          </div>
        );
      }

      // TEMPLATES LIST
      if (page === "templates" && !selectedTemplate) {
        return (
          <div className="min-h-screen bg-gray-50">
            <header className="bg-white shadow-sm">
              <div className="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                <div className="flex items-center gap-2">
                  <button onClick={() => setPage("top")} className="text-gray-400 hover:text-gray-600 mr-2 transition">
                    &larr; トップ
                  </button>
                  <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <span className="text-white font-bold text-sm">G</span>
                  </div>
                  <span className="font-bold text-xl text-gray-900">ガスサポ</span>
                </div>
                {!registered && (
                  <button
                    onClick={() => setPage("register")}
                    className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition"
                  >
                    無料登録
                  </button>
                )}
              </div>
            </header>

            <div className="max-w-5xl mx-auto px-4 py-8">
              <h1 className="text-2xl font-bold mb-6">テンプレート一覧</h1>

              {/* Category filter */}
              <div className="flex flex-wrap gap-2 mb-6">
                {CATEGORIES.map((cat) => (
                  <button
                    key={cat}
                    onClick={() => setSelectedCategory(cat)}
                    className={`px-4 py-2 rounded-full text-sm font-medium transition ${
                      selectedCategory === cat
                        ? "bg-blue-600 text-white"
                        : "bg-white text-gray-600 border hover:bg-gray-50"
                    }`}
                  >
                    {cat}
                  </button>
                ))}
              </div>

              {/* Template grid */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {filteredTemplates.map((t) => (
                  <button
                    key={t.id}
                    onClick={() => {
                      setSelectedTemplate(t);
                    }}
                    className="bg-white rounded-xl p-5 shadow-sm border text-left hover:shadow-md hover:border-blue-300 transition relative"
                  >
                    {t.hot && (
                      <span className="absolute top-3 right-3 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full font-bold">
                        HOT
                      </span>
                    )}
                    <div className="text-xs text-blue-600 font-bold mb-1">{t.category}</div>
                    <h3 className="font-bold text-gray-900 mb-2">{t.name}</h3>
                    <p className="text-gray-500 text-sm">{t.description}</p>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // TEMPLATE DETAIL + PREVIEW
      if (selectedTemplate) {
        return (
          <div className="min-h-screen bg-gray-50">
            <header className="bg-white shadow-sm">
              <div className="max-w-5xl mx-auto px-4 py-4 flex items-center gap-2">
                <button
                  onClick={() => setSelectedTemplate(null)}
                  className="text-gray-400 hover:text-gray-600 mr-2 transition"
                >
                  &larr; テンプレート一覧
                </button>
                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                  <span className="text-white font-bold text-sm">G</span>
                </div>
                <span className="font-bold text-xl text-gray-900">ガスサポ</span>
              </div>
            </header>

            <div className="max-w-5xl mx-auto px-4 py-8">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                {/* Left: Settings */}
                <div>
                  <div className="text-xs text-blue-600 font-bold mb-1">{selectedTemplate.category}</div>
                  <h1 className="text-2xl font-bold mb-2">{selectedTemplate.name}</h1>
                  <p className="text-gray-600 mb-6">{selectedTemplate.description}</p>

                  <div className="bg-white rounded-xl shadow-sm border p-5 space-y-4">
                    <h2 className="font-bold text-gray-900">会社情報</h2>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1">会社名</label>
                      <input
                        type="text"
                        placeholder="○○ガス株式会社"
                        value={companyInfo.name}
                        onChange={(e) => setCompanyInfo({ ...companyInfo, name: e.target.value })}
                        className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1">電話番号</label>
                      <input
                        type="text"
                        placeholder="0120-XXX-XXX"
                        value={companyInfo.tel}
                        onChange={(e) => setCompanyInfo({ ...companyInfo, tel: e.target.value })}
                        className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1">住所</label>
                      <input
                        type="text"
                        placeholder="千葉県○○市○○町1-2-3"
                        value={companyInfo.address}
                        onChange={(e) => setCompanyInfo({ ...companyInfo, address: e.target.value })}
                        className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                      />
                    </div>

                    {selectedTemplate.fields.length > 0 && (
                      <>
                        <h2 className="font-bold text-gray-900 pt-2">テンプレート固有項目</h2>
                        {selectedTemplate.fields.map((f) => (
                          <div key={f}>
                            <label className="block text-xs font-bold text-gray-500 mb-1">{f}</label>
                            <input
                              type="text"
                              placeholder={`${f}を入力`}
                              value={companyInfo.fields?.[f] || ""}
                              onChange={(e) =>
                                setCompanyInfo({
                                  ...companyInfo,
                                  fields: { ...companyInfo.fields, [f]: e.target.value },
                                })
                              }
                              className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                          </div>
                        ))}
                      </>
                    )}
                  </div>

                  <div className="mt-4 flex gap-3">
                    <button className="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                      PDFダウンロード（無料）
                    </button>
                    <button className="flex-1 bg-white text-blue-600 py-3 rounded-lg font-bold border-2 border-blue-600 hover:bg-blue-50 transition">
                      印刷を注文
                    </button>
                  </div>
                  <p className="text-xs text-gray-400 text-center mt-2">
                    印刷注文は有料プラン（月額9,800円）の機能です
                  </p>
                </div>

                {/* Right: Preview */}
                <div>
                  <h2 className="font-bold text-gray-900 mb-3">プレビュー</h2>
                  <div className="bg-gray-100 rounded-xl p-6 flex justify-center">
                    <TemplatePreview template={selectedTemplate} companyInfo={companyInfo} />
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GasSapoApp />);
  </script>
</body>
</html>
