<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | Kuu株式会社</title>
  <meta name="description" content="Kuu株式会社へのお問い合わせ。AI業務活用コンサルティングに関する無料相談・お見積もり・ご質問はこちらからお気軽にどうぞ。">
  <link rel="canonical" href="https://kuucorp.com/contact/">
  <link rel="icon" href="../img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css">
  <meta property="og:title" content="お問い合わせ | Kuu株式会社">
  <meta property="og:description" content="AI業務活用コンサルティングに関する無料相談・お見積もり・ご質問はこちらからお気軽にどうぞ。">
  <meta property="og:url" content="https://kuucorp.com/contact/">
  <meta property="og:image" content="https://kuucorp.com/img/og-default.jpg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Kuu株式会社">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <header>
    <div class="wrapper header-inner">
      <a href="../" class="logo-text">Kuu</a>
      <div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
      <nav id="nav">
        <ul>
          <li><a href="../">トップ</a></li>
          <li><a href="../about/">会社情報</a></li>
          <li><a href="../news/">ニュース</a></li>
          <li><a href="../contact/" class="nav-contact">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="wrapper panel">
        <span class="kicker">Contact</span>
        <h1>お問い合わせ</h1>
        <p>AI業務活用に関するご相談・お見積もり・ご質問など、お気軽にお問い合わせください。通常1〜2営業日以内にご返信いたします。</p>
      </div>
    </section>

    <section>
      <div class="wrapper">
        <form class="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
          <div class="form-group">
            <label for="company">会社名 <span class="required">*</span></label>
            <input type="text" id="company" name="company" required placeholder="例：株式会社サンプル">
          </div>
          <div class="form-group">
            <label for="name">お名前 <span class="required">*</span></label>
            <input type="text" id="name" name="name" required placeholder="例：山田 太郎">
          </div>
          <div class="form-group">
            <label for="email">メールアドレス <span class="required">*</span></label>
            <input type="email" id="email" name="email" required placeholder="例：yamada@example.com">
          </div>
          <div class="form-group">
            <label for="service">ご相談内容</label>
            <select id="service" name="service">
              <option value="">選択してください</option>
              <option value="AI活用ロードマップ策定">AI活用ロードマップ策定</option>
              <option value="業務自動化・AI実装支援">業務自動化・AI実装支援</option>
              <option value="社内AIアカデミー（研修）">社内AIアカデミー（研修）</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">メッセージ</label>
            <textarea id="message" name="message" rows="6" placeholder="ご相談内容やご質問をご記入ください"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-submit">送信する</button>
        </form>
        <p class="form-note">通常1〜2営業日以内にご返信いたします。</p>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrapper footer-inner">
      <div class="footer-info">
        <nav class="footer-nav">
          <ul>
            <li><a href="../">トップ</a></li>
            <li><a href="../about/">会社情報</a></li>
            <li><a href="../news/">ニュース</a></li>
            <li><a href="../contact/">お問い合わせ</a></li>
            <li><a href="../privacy_policy/">プライバシーポリシー</a></li>
          </ul>
        </nav>
        <p class="footer-address">Kuu株式会社 | 東京都渋谷区</p>
      </div>
      <p class="copyright">&copy; 2026 Kuu株式会社 All Rights Reserved.</p>
    </div>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById('nav').classList.toggle('active');
    }
  </script>
</body>
</html>
