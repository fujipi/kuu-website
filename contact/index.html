<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; form-action 'self' https://formspree.io; connect-src 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="permissions-policy" content="geolocation=(), microphone=(), camera=()">
  <title>お問い合わせ | Kuu株式会社</title>
  <meta name="description" content="Kuu株式会社へのお問い合わせ。無料相談・お見積もり・ご質問はこちらからお気軽にどうぞ。">
  <link rel="canonical" href="https://kuucorp.com/contact/">
  <link rel="icon" href="../img/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="../img/favicon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="../img/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/style.css">
  <meta property="og:title" content="お問い合わせ | Kuu株式会社">
  <meta property="og:description" content="Kuu株式会社へのお問い合わせ。無料相談・お見積もり・ご質問はこちらからお気軽にどうぞ。">
  <meta property="og:url" content="https://kuucorp.com/contact/">
  <meta property="og:image" content="https://kuucorp.com/img/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Kuu株式会社">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary_large_image">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "name": "お問い合わせ",
    "url": "https://kuucorp.com/contact/",
    "mainEntity": {
      "@type": "Organization",
      "name": "Kuu株式会社",
      "url": "https://kuucorp.com",
      "contactPoint": {
        "@type": "ContactPoint",
        "url": "https://kuucorp.com/contact/",
        "contactType": "customer service",
        "availableLanguage": "Japanese"
      }
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Top", "item": "https://kuucorp.com/" },
      { "@type": "ListItem", "position": 2, "name": "Contact", "item": "https://kuucorp.com/contact/" }
    ]
  }
  </script>
</head>
<body>

  <header>
    <a href="../" class="logo"><img src="../img/logo.png" alt="Kuu" class="logo-img"></a>
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="メニューを開く" aria-expanded="false"><span></span><span></span><span></span></button>
    <nav id="nav">
      <ul>
        <li><a href="../">Top</a></li>
        <li><a href="../about/">About</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="page-content">
      <h1 class="page-title fade-in">Contact</h1>

      <div class="fade-in">
        <form class="contact-form" action="https://formspree.io/f/fuji@kuucorp.com" method="POST">
          <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
          <div class="form-group">
            <label for="company">会社名 <span class="required">*</span></label>
            <input type="text" id="company" name="company" required placeholder="例：株式会社サンプル">
          </div>
          <div class="form-group">
            <label for="name">お名前 <span class="required">*</span></label>
            <input type="text" id="name" name="name" required placeholder="例：山田 太郎">
          </div>
          <div class="form-group">
            <label for="email">メールアドレス <span class="required">*</span></label>
            <input type="email" id="email" name="email" required placeholder="例：yamada@example.com">
          </div>
          <div class="form-group">
            <label for="service">お問い合わせ種別</label>
            <select id="service" name="service">
              <option value="">選択してください</option>
              <option value="プロジェクトのご相談">プロジェクトのご相談</option>
              <option value="業務提携について">業務提携について</option>
              <option value="採用について">採用について</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">メッセージ</label>
            <textarea id="message" name="message" rows="6" placeholder="ご相談内容やご質問をご記入ください"></textarea>
          </div>
          <button type="submit" class="btn-submit">送信する</button>
        </form>
        <p class="form-note">通常1〜2営業日以内にご返信いたします。</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-links">
      <a href="../contact/">Contact</a>
      <a href="../privacy_policy/">Privacy</a>
    </div>
    <div class="footer-copy">&copy; 2026 Kuu Inc.</div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
