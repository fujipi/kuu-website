<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | Kuu株式会社</title>
  <meta name="description" content="Kuu株式会社へのお問い合わせ。AI業務活用コンサルティングに関する無料相談・お見積もり・ご質問はこちらからお気軽にどうぞ。">
  <link rel="canonical" href="https://kuucorp.com/contact/">
  <link rel="icon" href="../img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css">
  <meta property="og:title" content="お問い合わせ | Kuu株式会社">
  <meta property="og:description" content="AI業務活用コンサルティングに関する無料相談・お見積もり・ご質問はこちらからお気軽にどうぞ。">
  <meta property="og:url" content="https://kuucorp.com/contact/">
  <meta property="og:image" content="https://kuucorp.com/img/og-default.jpg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Kuu株式会社">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>

  <header>
    <a href="../" class="logo-text">Kuu</a>
    <div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <nav id="nav">
      <ul>
        <li><a href="../">Top</a></li>
        <li><a href="../about/">About</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="page-content">
      <h1 class="page-title fade-in">Contact</h1>

      <div class="fade-in">
        <form class="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
          <div class="form-group">
            <label for="company">会社名 <span class="required">*</span></label>
            <input type="text" id="company" name="company" required placeholder="例：株式会社サンプル">
          </div>
          <div class="form-group">
            <label for="name">お名前 <span class="required">*</span></label>
            <input type="text" id="name" name="name" required placeholder="例：山田 太郎">
          </div>
          <div class="form-group">
            <label for="email">メールアドレス <span class="required">*</span></label>
            <input type="email" id="email" name="email" required placeholder="例：yamada@example.com">
          </div>
          <div class="form-group">
            <label for="service">ご相談内容</label>
            <select id="service" name="service">
              <option value="">選択してください</option>
              <option value="AX / DX戦略コンサルティング">AX / DX戦略コンサルティング</option>
              <option value="AI業務自動化サービス">AI業務自動化サービス</option>
              <option value="Yota mangaサービス">Yota mangaサービス</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">メッセージ</label>
            <textarea id="message" name="message" rows="6" placeholder="ご相談内容やご質問をご記入ください"></textarea>
          </div>
          <button type="submit" class="btn-submit">送信する</button>
        </form>
        <p class="form-note">通常1〜2営業日以内にご返信いたします。</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-links">
      <a href="../contact/">Contact</a>
      <a href="../privacy_policy/">Privacy</a>
    </div>
    <div class="footer-copy">&copy; 2026 Kuu Inc.</div>
  </footer>

  <script>
    (function() {
      for (var i = 0; i < 120; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
        s.style.setProperty('--delay', (Math.random() * 5) + 's');
        document.body.appendChild(s);
      }
    })();
    (function() {
      var obs = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.1 });
      document.querySelectorAll('.fade-in').forEach(function(el) { obs.observe(el); });
    })();
    function toggleMenu() { document.getElementById('nav').classList.toggle('active'); }
  </script>
</body>
</html>
